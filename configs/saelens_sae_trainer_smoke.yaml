# Cached activations source
cached_activations_source: hf
hf_dataset_repo_id: mechark/MamaySAEDataset
hf_data_dir: data
hf_split: train
hf_streaming: false
hf_shuffle_buffer_size: 2000

# (Optional) local-disk fallback:
# cached_activations_source: local
# cached_activations_path: data/saelens_cached_activations_blocks33_resid_post
hook_name: blocks.33.hook_resid_post
d_in: 3584

# Local CPU smoke test
device: cpu
seed: 42
shuffle_dataset: true

# Keep this tiny so it runs quickly on Mac CPU
training_tokens: 4096
train_batch_size_tokens: 128
mixing_buffer_size_tokens: 4096

lr: 0.0003
lr_end: 0.00003
lr_scheduler_name: constant
lr_warm_up_steps: 0

autocast: false
n_checkpoints: 0
save_final_checkpoint: false
log_to_wandb: false

# Output
output_dir: artifacts/sae_lens_runs/smoke_blocks33_resid_post
inference_model_subdir: sae_inference

# Hub upload disabled for smoke test
push_to_hub: false

sae:
  # Make this small enough to be comfortable on CPU but still non-trivial
  d_sae: 4096
  l1_coefficient: 5.0
  normalize_activations: expected_average_only_in
  apply_b_dec_to_input: true

